name: CodeQL

# Manual-only while this repository is private. The analysis itself passes, but
# uploading its results is code scanning — a GitHub Advanced Security feature on
# private repos — so analyze@v3 dies with "Resource not accessible by integration"
# and every run goes red. A check that can never be green just teaches people to
# ignore red checks. Restore the push/pull_request/schedule triggers below once the
# repo is public or GHAS is enabled; nothing else needs to change.
#
#  push:
#    branches: [main]
#  pull_request:
#    branches: [main]
#  schedule:
#    - cron: "0 6 * * 3" # Weekly on Wednesday 06:00 UTC
on:
  workflow_dispatch:

permissions: {}

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  analyze:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    permissions:
      contents: read
      security-events: write
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          persist-credentials: false

      - uses: actions/setup-java@c1e323688fd81a25caa38c78aa6df2d33d3e20d9 # v4
        with:
          distribution: temurin
          java-version: "17"

      - uses: github/codeql-action/init@02c5e83432fe5497fd85b873b6c9f16a8578e1d9 # v3
        with:
          languages: java-kotlin

      - uses: github/codeql-action/autobuild@02c5e83432fe5497fd85b873b6c9f16a8578e1d9 # v3

      - uses: github/codeql-action/analyze@02c5e83432fe5497fd85b873b6c9f16a8578e1d9 # v3
