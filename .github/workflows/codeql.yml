name: CodeQL

# Manual-only while this repository is private. The analysis itself passes, but
# uploading its results is code scanning — a GitHub Advanced Security feature on
# private repos — so analyze@v3 dies with "Resource not accessible by integration"
# and every run goes red. A check that can never be green just teaches people to
# ignore red checks. Restore the push/pull_request/schedule triggers below once the
# repo is public or GHAS is enabled; nothing else needs to change.
#
#  push:
#    branches: [main]
#  pull_request:
#    branches: [main]
#  schedule:
#    - cron: "0 6 * * 3" # Weekly on Wednesday 06:00 UTC
on:
  workflow_dispatch:

permissions: {}

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  analyze:
    name: CodeQL analyze
    runs-on: ubuntu-latest
    timeout-minutes: 20
    permissions:
      contents: read
      security-events: write # analyze@v3 uploads SARIF to code scanning
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          persist-credentials: false

      - uses: actions/setup-java@03ad4de0992f5dab5e18fcb136590ce7c4a0ac95 # v5.6.0
        with:
          distribution: temurin
          java-version: "17"

      - uses: github/codeql-action/init@02c5e83432fe5497fd85b873b6c9f16a8578e1d9 # v3.37.0
        with:
          languages: java-kotlin

      - uses: github/codeql-action/autobuild@02c5e83432fe5497fd85b873b6c9f16a8578e1d9 # v3.37.0

      - uses: github/codeql-action/analyze@02c5e83432fe5497fd85b873b6c9f16a8578e1d9 # v3.37.0
