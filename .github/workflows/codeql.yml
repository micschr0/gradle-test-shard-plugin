name: CodeQL

on:
  push:
    branches: [main]
    # Only filter the push trigger. CodeQL is a required status check, so the
    # pull_request trigger must stay unfiltered — a skipped required check on a
    # doc-only PR would block the merge instead of passing.
    paths-ignore:
      - "**.md"
      - "LICENSE"
  pull_request:
    branches: [main]
  schedule:
    - cron: "0 6 * * 3" # Weekly on Wednesday 06:00 UTC
  workflow_dispatch:

permissions: {}

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  analyze:
    name: CodeQL analyze
    runs-on: ubuntu-latest
    timeout-minutes: 20
    permissions:
      contents: read
      security-events: write # analyze@v3 uploads SARIF to code scanning
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          persist-credentials: false

      - uses: actions/setup-java@03ad4de0992f5dab5e18fcb136590ce7c4a0ac95 # v5.6.0
        with:
          distribution: temurin
          java-version: "17"

      - uses: github/codeql-action/init@02c5e83432fe5497fd85b873b6c9f16a8578e1d9 # v3.37.0
        with:
          languages: java-kotlin
          # autobuild hooks the Kotlin daemon, whose extractor rejects Kotlin 2.4.10
          # (KotlinVersionTooRecentError: supports < 2.4.10). build-mode none
          # extracts from source directly and sidesteps the compiler interceptor.
          build-mode: none

      - uses: github/codeql-action/analyze@02c5e83432fe5497fd85b873b6c9f16a8578e1d9 # v3.37.0
