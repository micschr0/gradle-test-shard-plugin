name: Release

on:
  push:
    tags: ["v*"]
  # release-please pushes the tag with GITHUB_TOKEN, which by design does not
  # trigger the `push` event above. Its workflow dispatches this instead,
  # passing the freshly created tag so the same jobs run against it.
  workflow_dispatch:
    inputs:
      tag:
        description: Tag to release (e.g. v0.4.2)
        required: true
        type: string

permissions: {}

concurrency:
  group: ${{ github.workflow }}-${{ inputs.tag || github.ref }}
  cancel-in-progress: false

env:
  # The tag under release: the dispatch input, or the pushed tag's name.
  VERSION: ${{ inputs.tag || github.ref_name }}

jobs:
  # Cache OFF, same reason as `publish` below: this job's `check` is the last
  # gate before an effectively permanent portal artifact, and a poisoned cache
  # entry could make it pass on code that never really built. Cold runs cost
  # ~4 extra minutes — cheap against a release no one can retract.
  check:
    name: Verify
    runs-on: ubuntu-latest
    timeout-minutes: 20
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          persist-credentials: false
          ref: ${{ env.VERSION }}

      # Fail fast if the tag and the built version disagree — otherwise the
      # portal would publish one version while the release notes describe
      # another. Reads `version = "x.y.z"` straight from build.gradle.kts.
      - name: Guard tag matches build version
        run: |
          set -euo pipefail
          tag_version="${VERSION#v}"
          build_version="$(sed -n 's/^version = "\([^"]*\)".*/\1/p' build.gradle.kts)"
          if [ "$tag_version" != "$build_version" ]; then
            echo "::error::tag $VERSION (version $tag_version) does not match build.gradle.kts version $build_version"
            exit 1
          fi
          echo "tag and build version agree: $build_version"

      - uses: ./.github/actions/setup-jvm
        with:
          cache-disabled: "true"

      - run: ./gradlew check

  # Cache OFF: the artifact on the Plugin Portal is effectively permanent after
  # the 7-day self-service delete window. A poisoned cache entry could ship a
  # broken plugin that no one can remove — see gradle/actions#72 for the
  # underlying cache-contamination risk.
  publish:
    name: Publish plugin
    needs: check
    runs-on: ubuntu-latest
    timeout-minutes: 20
    permissions:
      contents: read
      id-token: write # Sigstore OIDC signing during publishPlugins
      attestations: write # SLSA build provenance attestation
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          persist-credentials: false
          ref: ${{ env.VERSION }}

      # Replay guard: a re-pushed or moved tag must not re-publish. If a
      # GitHub Release already exists for this tag, the version was already
      # shipped — fail before touching the portal or signing anything.
      - name: Guard against re-publish
        env:
          GH_TOKEN: ${{ github.token }}
          VERSION: ${{ inputs.tag || github.ref_name }}
        run: |
          set -euo pipefail
          if gh release view "$VERSION" \
              --repo "${{ github.repository }}" >/dev/null 2>&1; then
            echo "::error::release $VERSION already exists — refusing to re-publish"
            exit 1
          fi
          echo "no existing release for $VERSION — proceeding"

      - uses: ./.github/actions/setup-jvm
        with:
          cache-disabled: "true"

      - name: Publish to the Plugin Portal
        run: ./gradlew publishPlugins
        env:
          GRADLE_PUBLISH_KEY: ${{ secrets.GRADLE_PUBLISH_KEY }}
          GRADLE_PUBLISH_SECRET: ${{ secrets.GRADLE_PUBLISH_SECRET }}
          # Enables Sigstore signing (off by default so local and e2e
          # publishToMavenLocal runs do not need an OIDC provider).
          SIGSTORE_SIGN: "true"

      # SLSA build provenance: binds each jar to this workflow run + commit,
      # verifiable with `gh attestation verify`. Sigstore signs the bytes;
      # this proves who built them and from what source.
      - name: Attest build provenance
        uses: actions/attest-build-provenance@977bb373ede98d70efdf65b84cb5f73e068dcc2a # v3.0.0
        with:
          subject-path: build/libs/*.jar

      # `if-no-files-found: error` only fires when the WHOLE path set is empty,
      # so the jars alone satisfied it while every bundle was missing — that is
      # how v0.4.0 and v0.4.1 shipped unsigned. Assert the pairing explicitly.
      - name: Verify every jar has a Sigstore bundle
        run: |
          set -euo pipefail
          missing=0
          for jar in build/libs/*.jar; do
            if [ ! -f "${jar}.sigstore.json" ]; then
              echo "::error::no Sigstore bundle for ${jar}"
              missing=1
            fi
          done
          [ "$missing" -eq 0 ] || exit 1
          echo "all jars carry a Sigstore bundle"

      # Hand the signed artifacts to the release-notes job so it can attach
      # them to the GitHub Release (OpenSSF Scorecard Signed-Releases check).
      - name: Upload signed artifacts
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: signed-artifacts
          path: |
            build/libs/*.jar
            build/libs/*.sigstore.json
          if-no-files-found: error
          retention-days: 7

  # Runs only after the portal publish succeeds, so a failed publish never
  # leaves a GitHub Release advertising a version that is not downloadable.
  release-notes:
    name: GitHub Release
    needs: publish
    runs-on: ubuntu-latest
    timeout-minutes: 5
    permissions:
      contents: write # create the GitHub Release
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          persist-credentials: false
          ref: ${{ env.VERSION }}

      - name: Download signed artifacts
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4.3.0
        with:
          name: signed-artifacts
          path: artifacts

      # Extracts the section for this tag from CHANGELOG.md: everything after
      # the matching `## [x.y.z]` heading up to the next `## [` heading.
      # Falls back to a generated note if the version has no changelog entry.
      - name: Extract changelog section
        id: notes
        run: |
          set -euo pipefail
          version="${VERSION#v}"
          awk -v ver="$version" '
            $0 ~ "^## \\[" ver "\\]" { found = 1; next }
            found && /^## \[/ { exit }
            found { print }
          ' CHANGELOG.md > notes.md
          if [ ! -s notes.md ]; then
            echo "No CHANGELOG entry for ${version}." > notes.md
          fi
          {
            echo "Published to the [Gradle Plugin Portal](https://plugins.gradle.org/plugin/de.micschro.shardwise)."
            echo
            echo '```kotlin'
            echo "plugins { id(\"de.micschro.shardwise\") version \"${version}\" }"
            echo '```'
          } >> notes.md

      # Attaches the signed jars and their .sigstore.json bundles so the
      # release is independently verifiable (OpenSSF Signed-Releases).
      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          VERSION: ${{ inputs.tag || github.ref_name }}
        run: |
          gh release create "$VERSION" --title "$VERSION" \
            --notes-file notes.md --verify-tag \
            artifacts/*.jar artifacts/*.sigstore.json
