name: Release

on:
  push:
    tags: ["v*"]

permissions: {}

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

jobs:
  # Cache ON: `./gradlew check` is local-build-style verification and benefits
  # from cache hits (5min → 1min on cold runs). Per user policy, only weight-
  # computing jobs disable cache; `check` is not one of them.
  check:
    name: Verify
    runs-on: ubuntu-latest
    timeout-minutes: 20
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          persist-credentials: false

      - uses: actions/setup-java@03ad4de0992f5dab5e18fcb136590ce7c4a0ac95 # v5.6.0
        with:
          distribution: temurin
          java-version: "17"

      - uses: gradle/actions/setup-gradle@3f131e8634966bd73d06cc69884922b02e6faf92 # v6.2.0
        with:
          cache-disabled: true

      - run: ./gradlew check

  # Cache OFF: the artifact on the Plugin Portal is effectively permanent after
  # the 7-day self-service delete window. A poisoned cache entry could ship a
  # broken plugin that no one can remove — see gradle/actions#72 for the
  # underlying cache-contamination risk.
  publish:
    name: Publish plugin
    needs: check
    runs-on: ubuntu-latest
    timeout-minutes: 20
    permissions:
      contents: read
      id-token: write # Sigstore OIDC signing during publishPlugins
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          persist-credentials: false

      - uses: actions/setup-java@03ad4de0992f5dab5e18fcb136590ce7c4a0ac95 # v5.6.0
        with:
          distribution: temurin
          java-version: "17"

      - uses: gradle/actions/setup-gradle@3f131e8634966bd73d06cc69884922b02e6faf92 # v6.2.0
        with:
          cache-disabled: true

      - name: Publish to the Plugin Portal
        run: ./gradlew publishPlugins
        env:
          GRADLE_PUBLISH_KEY: ${{ secrets.GRADLE_PUBLISH_KEY }}
          GRADLE_PUBLISH_SECRET: ${{ secrets.GRADLE_PUBLISH_SECRET }}
          # Enables Sigstore signing (off by default so local and e2e
          # publishToMavenLocal runs do not need an OIDC provider).
          SIGSTORE_SIGN: "true"

  # Runs only after the portal publish succeeds, so a failed publish never
  # leaves a GitHub Release advertising a version that is not downloadable.
  release-notes:
    name: GitHub Release
    needs: publish
    runs-on: ubuntu-latest
    timeout-minutes: 5
    permissions:
      contents: write # create the GitHub Release
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          persist-credentials: false

      # Extracts the section for this tag from CHANGELOG.md: everything after
      # the matching `## [x.y.z]` heading up to the next `## [` heading.
      # Falls back to a generated note if the version has no changelog entry.
      - name: Extract changelog section
        id: notes
        env:
          VERSION: ${{ github.ref_name }}
        run: |
          set -euo pipefail
          version="${VERSION#v}"
          awk -v ver="$version" '
            $0 ~ "^## \\[" ver "\\]" { found = 1; next }
            found && /^## \[/ { exit }
            found { print }
          ' CHANGELOG.md > notes.md
          if [ ! -s notes.md ]; then
            echo "No CHANGELOG entry for ${version}." > notes.md
          fi
          {
            echo "Published to the [Gradle Plugin Portal](https://plugins.gradle.org/plugin/de.micschro.shardwise)."
            echo
            echo '```kotlin'
            echo "plugins { id(\"de.micschro.shardwise\") version \"${version}\" }"
            echo '```'
          } >> notes.md

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          VERSION: ${{ github.ref_name }}
        run: gh release create "$VERSION" --title "$VERSION" --notes-file notes.md --verify-tag
