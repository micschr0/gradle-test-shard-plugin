name: Docs

on:
  push:
    paths: ["**.md", ".markdownlint.json", ".github/workflows/docs.yml"]
  pull_request:
    paths: ["**.md", ".markdownlint.json", ".github/workflows/docs.yml"]

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.ref != 'refs/heads/main' }}

jobs:
  lint:
    name: Markdown lint
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          persist-credentials: false

      - uses: DavidAnson/markdownlint-cli2-action@6bf21b07787794f89a243495939cd651942aeabe # v24.1.0
        with:
          config: .markdownlint.json
          # plans/ and docs/_audit are internal working artifacts (SDD notes,
          # audit baselines) — not consumer-facing docs, not lint-gated.
          globs: |
            **.md
            !plans
            !docs/_audit
