# plans/config.yaml
schema: spec-driven

context: |
  Kotlin JVM Gradle plugin (Kotlin 2.4.0, min Gradle API 8.11, Java 17).
  explicitApi() on; api/*.api frozen via binary-compatibility-validator; detekt lint.
  Two layers: pure internal/ (TestShardPlanner, TestWeights, no Gradle types) vs
  Gradle glue (ShardwisePlugin, ShardBuildService, NodeEnvValueSource).
  Gradle runs ONLY in Docker (host has no JDK) — see testing: below for wrapper.
  Greedy-LPT test sharding across CI nodes via CI_NODE_INDEX/CI_NODE_TOTAL.

strict_tdd: true

testing:
  docker_wrapper: |
    gradle() {
      docker run --rm --network host -v "$PWD":/w -w /w \
        -v gradle-shardwise-cache:/home/gradle/.gradle \
        gradle:8.11-jdk17 ./gradlew --no-daemon "$@"
    }
  unit_test_command: "gradle test"
  functional_test_command: "gradle functionalTest"
  test_command: "gradle functionalTest"   # primary TDD command — TestKit tests are the source of truth for plugin behaviour
  check_command: "gradle check"           # unit + functional + apiCheck + validatePlugins — run before committing
  api_dump_command: "gradle apiDump"      # regenerate api/*.api after ANY public API change
  coverage_threshold: 0

rules:
  proposal:
    - Include rollback plan for risky changes
    - Flag any change touching api/*.api as a frozen-API risk requiring explicit widening rationale
  specs:
    - Use Given/When/Then for scenarios
    - Use RFC 2119 keywords (MUST, SHALL, SHOULD, MAY)
  design:
    - Include sequence diagrams for complex flows
    - Document architecture decisions with rationale
    - Call out configuration-cache safety implications explicitly (afterEvaluate/projectsEvaluated forbidden, ValueSource for env, Serializable results, lazy wiring, ListProperty/MapProperty/SetProperty not Property<List<T>>)
  tasks:
    - Group by phase, use hierarchical numbering
    - Keep tasks completable in one session
    - New planning/weighting logic goes into internal/TestShardPlanner or internal/TestWeights (pure, unit-testable); Gradle glue stays thin
  apply:
    guidelines:
      - Follow existing code patterns
      - Never rename/remove anything in api/*.api; only widen deliberately
      - Unknown modules/tasks/missing or stale weights must default to running, never to being skipped (coverage beats balance)
      - Don't use Gradle APIs newer than 8.11 in main sources
    tdd: true
    test_command: "gradle functionalTest"
  verify:
    test_command: "gradle check"
    build_command: "gradle check"
    coverage_threshold: 0
  archive:
    - Warn before merging destructive deltas
